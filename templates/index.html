<!DOCTYPE html>
<html>
<head>
    <title>Tomato Leaf Disease Detection</title>
</head>
<body>
    <h2>Tomato Leaf Disease Detection</h2>

    <form action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="file" required>
        <br><br>
        <input type="submit" value="Predict">
    </form>

    {% if result %}
        <h3>Result: {{ result }}</h3>
        <p>{{ solution }}</p>
    {% endif %}
</body>
</html>
